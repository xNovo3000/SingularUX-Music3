[versions]
# Plugins
agp = "8.11.0"
kotlin = "2.2.0"
kotlin-ksp = "2.2.0-2.0.2"
hilt = "2.56.2"
# Libraries
androidx-core = "1.16.0"
androidx-activity = "1.10.1"
jetpack-compose = "2025.06.01"
jetpack-compose-material3 = "1.4.0-alpha17"

[libraries]
# AndroidX
androidx-core = { group = "androidx.core", name = "core-ktx", version.ref = "androidx-core" }
androidx-activity = { group = "androidx.activity", name = "activity-compose", version.ref = "androidx-activity" }
# Hilt
hilt-android = { group = "com.google.dagger", name = "hilt-android", version.ref = "hilt" }
hilt-compiler = { group = "com.google.dagger", name = "hilt-android-compiler", version.ref = "hilt" }
# Jetpack Compose
jetpack-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "jetpack-compose" }
jetpack-compose-animation = { group = "androidx.compose.animation", name = "animation" }
jetpack-compose-foundation = { group = "androidx.compose.foundation", name = "foundation" }
jetpack-compose-runtime = { group = "androidx.compose.runtime", name = "runtime" }
jetpack-compose-ui = { group = "androidx.compose.ui", name = "ui" }
jetpack-compose-material3 = { group = "androidx.compose.material3", name = "material3", version.ref = "jetpack-compose-material3" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-ksp = { id = "com.google.devtools.ksp", version.ref = "kotlin-ksp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
hilt = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
android-library = { id = "com.android.library", version.ref = "agp" }
