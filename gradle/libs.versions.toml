[versions]
# Plugins
agp = "8.11.0"
kotlin = "2.2.0"
kotlin-ksp = "2.2.0-2.0.2"
hilt = "2.56.2"
# Libraries
androidx-core = "1.16.0"
androidx-core-splashscreen = "1.0.1"
androidx-activity = "1.10.1"
coil = "3.2.0"
lifecycle = "2.9.1"
lifecycle-navigation3 = "1.0.0-alpha03"
hilt-navigation-compose = "1.2.0"
jetpack-compose = "2025.06.01"
jetpack-compose-material3 = "1.4.0-alpha17"
kotlinx-coroutines-guava = "1.10.2"
kotlinx-serialization-json = "1.9.0"
media3 = "1.7.1"
navigation3 = "1.0.0-alpha05"

[libraries]
# AndroidX
androidx-core = { group = "androidx.core", name = "core-ktx", version.ref = "androidx-core" }
androidx-core-splashscreen = { group = "androidx.core", name = "core-splashscreen", version.ref = "androidx-core-splashscreen" }
androidx-activity = { group = "androidx.activity", name = "activity-compose", version.ref = "androidx-activity" }
lifecycle-viewmodel = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-compose", version.ref = "lifecycle" }
lifecycle-viewmodel-navigation3 = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-navigation3", version.ref = "lifecycle-navigation3" }
# Coil
coil = { group = "io.coil-kt.coil3", name = "coil-compose", version.ref = "coil" }
# Hilt
hilt-android = { group = "com.google.dagger", name = "hilt-android", version.ref = "hilt" }
hilt-compiler = { group = "com.google.dagger", name = "hilt-android-compiler", version.ref = "hilt" }
hilt-navigation-compose = { group = "androidx.hilt", name = "hilt-navigation-compose", version.ref = "hilt-navigation-compose" }
# Jetpack Compose
jetpack-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "jetpack-compose" }
jetpack-compose-animation = { group = "androidx.compose.animation", name = "animation" }
jetpack-compose-foundation = { group = "androidx.compose.foundation", name = "foundation" }
jetpack-compose-runtime = { group = "androidx.compose.runtime", name = "runtime" }
jetpack-compose-ui = { group = "androidx.compose.ui", name = "ui" }
# Jetpack Compose - Preview
jetpack-compose-ui-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
jetpack-compose-ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }
# Jetpack Compose - Material 3
jetpack-compose-material3 = { group = "androidx.compose.material3", name = "material3", version.ref = "jetpack-compose-material3" }
jetpack-compose-material-icons = { group = "androidx.compose.material", name = "material-icons-extended" }
# KotlinX
kotlinx-coroutines-guava = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-guava", version.ref = "kotlinx-coroutines-guava" }
kotlinx-serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "kotlinx-serialization-json" }
# Media 3
media3-exoplayer = { group = "androidx.media3", name = "media3-exoplayer", version.ref = "media3" }
media3-session = { group = "androidx.media3", name = "media3-session", version.ref = "media3" }
# Navigation
navigation3-runtime = { group = "androidx.navigation3", name = "navigation3-runtime", version.ref = "navigation3" }
navigation3-ui = { group = "androidx.navigation3", name = "navigation3-ui", version.ref = "navigation3" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-ksp = { id = "com.google.devtools.ksp", version.ref = "kotlin-ksp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlinx-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
hilt = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
